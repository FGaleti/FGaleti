name: Update GitHub Profile Metrics

on:
  # Permite executar manualmente pela aba Actions.
  workflow_dispatch:

  # Atualização automática diária às 06:00 UTC.
  schedule:
    - cron: "0 6 * * *"

  # Executa quando este workflow for alterado na branch main.
  push:
    branches:
      - main
    paths:
      - ".github/workflows/metrics.yml"

# Necessário para salvar os SVGs gerados no repositório.
permissions:
  contents: write

# Impede duas execuções simultâneas.
concurrency:
  group: github-profile-metrics
  cancel-in-progress: true

jobs:
  generate-metrics:
    name: Generate GitHub Profile Metrics
    runs-on: ubuntu-latest

    steps:
      # ============================================================
      # 1. Resumo geral do perfil
      # ============================================================
      - name: Generate profile overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: FGaleti

          filename: metrics/profile-overview.svg

          template: classic
          config_timezone: America/Sao_Paulo
          config_animations: true
          config_padding: 5%
          config_output: svg
          config_twemoji: true

          base: header, activity, community, repositories, metadata

          repositories_forks: false

      # ============================================================
      # 2. Calendário anual de contribuições
      # ============================================================
      - name: Generate contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: FGaleti

          filename: metrics/contribution-calendar.svg

          template: classic
          config_timezone: America/Sao_Paulo
          config_animations: true
          config_padding: 5%
          config_output: svg
          config_twemoji: true

          base: ""

          repositories_forks: false

          plugin_isocalendar: true
          plugin_isocalendar_duration: full-year

      # ============================================================
      # 3. Linguagens mais utilizadas
      # ============================================================
      - name: Generate language metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: FGaleti

          filename: metrics/devops-languages.svg

          template: classic
          config_timezone: America/Sao_Paulo
          config_animations: true
          config_padding: 5%
          config_output: svg
          config_twemoji: true

          base: ""

          repositories_forks: false

          plugin_languages: true
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_threshold: 0%